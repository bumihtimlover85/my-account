name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install latest Vercel CLI
        run: npm install -g vercel@latest
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          POSTGRES_PRISMA_URL: postgresql://mock:mock@localhost:5432/mock
          JWT_SECRET: ci-mock-secret-for-build-only
      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_wgZ52ilGmid7GdSY7EVLQcvB
          VERCEL_PROJECT_ID: prj_ssLTdGoVzxw4HCJyRED2Szb69KOe
        run: vercel --prod --token "$VERCEL_TOKEN" --yes
