name: Bug Report
about: 报告一个 bug
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "感谢提交 bug 报告，请尽量填写以下信息帮助我们快速定位问题。"

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 bug
      placeholder: 发生了什么问题？
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何一步步复现这个问题
      placeholder: |
        1. 进入 ... 页面
        2. 点击 ...
        3. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 浏览器、操作系统、Node 版本等
      placeholder: |
        - OS: macOS 14
        - Browser: Chrome 120
        - Node: 22.x
    validations:
      required: false