name: Feature Request
about: 提议一个新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 描述你遇到的问题或需求场景
      placeholder: 我在使用 ... 时，发现缺少 ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何实现这个功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你还考虑过哪些其他方案
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 截图、参考链接等
    validations:
      required: false